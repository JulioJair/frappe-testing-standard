name: Unit Tests

# Runs on every pull request.
# Only executes Strategy A tests (mock-based, no DB required).
# Strategy B and C tests require a real Frappe site and run separately.

on:
  pull_request:
    branches: ['**']

env:
  FRAPPE_VERSION: version-15  # change to your Frappe version: version-13, version-14, version-15
  PYTHON_VERSION: '3.10'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install frappe
        run: pip install "frappe @ git+https://github.com/frappe/frappe@${{ env.FRAPPE_VERSION }}"

      - name: Install app requirements
        run: pip install pytest -r requirements.txt

      - name: Run unit tests
        # Reads test module paths from .github/unit-tests.txt (one per line, # for comments).
        # Only include Strategy A test modules here — those that run without a DB.
        run: |
          python -m pytest $(grep -v '^\s*#' .github/unit-tests.txt | grep '\S' | tr '\n' ' ') -v --tb=short
